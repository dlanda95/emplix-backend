name: Deploy — Development (Azure)

on:
  push:
    branches: [dev]

jobs:
  migrate:
    name: DB Migrations (DEV)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Platform schema sync
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}

      - name: Tenant schema migrations
        run: npm run db:migrate:tenants
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}

  deploy:
    name: Deploy Backend (App Service DEV)
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Deploy to Azure App Service (DEV)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_DEV }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_DEV }}
          package: .
